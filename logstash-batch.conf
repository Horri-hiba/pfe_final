input {
  file {
    path => "/data/*.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  # Supprimer BOM et espaces
  mutate {
    strip => ["message"]
    gsub => ["message", '^\xef\xbb\xbf', ""]
  }

  # Ignorer lignes vides
  if [message] =~ /^\s*$/ { drop {} }

  # Le CSV est entouré de guillemets externes => enlever le premier et dernier guillemet
  mutate {
    gsub => ["message", '^"(.*)"[\r]?$', '\1']
  }

  # Remplacer les guillemets doubles internes "" par rien (artifact du CSV)
  mutate {
    gsub => ["message", '""', '']
  }

  # Maintenant parser les colonnes: id,device_id,timestamp,message,type,ip,extra,severity
  csv {
    separator => ","
    columns => ["event_id","device_id","event_time","msg","event_type","ip_address","extra","severity"]
    quote_char => '"'
  }

  mutate {
    strip => ["event_id","device_id","event_time","msg","event_type","ip_address","severity"]
    rename => { "msg" => "message_text" }
    remove_field => ["extra","@version","host","log","event"]
    add_field => { "ingested_at" => "%{@timestamp}" }
  }

  # Ignorer header
  if [event_id] == "id" or [event_id] =~ /^\s*$/ or ![event_id] { drop {} }

  mutate {
    convert => { "severity"  => "integer" }
    convert => { "device_id" => "integer" }
  }

  # Classifier alert_level
  if [severity] == 5 {
    mutate { add_field => { "alert_level" => "critical" } }
  } else if [severity] == 4 {
    mutate { add_field => { "alert_level" => "major" } }
  } else if [severity] == 3 {
    mutate { add_field => { "alert_level" => "minor" } }
  } else if [severity] == 2 {
    mutate { add_field => { "alert_level" => "warning" } }
  } else {
    mutate { add_field => { "alert_level" => "info" } }
  }
}

output {
  # network_all → tous les events
  kafka {
    bootstrap_servers => "kafka-batch:9092"
    topic_id => "network_all"
    codec => json
  }

  # network_alerts → severity >= 4
  if [severity] and [severity] >= 4 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id => "network_alerts"
      codec => json
    }
  }

  # network_metrics → types réseau
  if [event_type] in ["interface","ipv4","bgpPeer","temperature","sensor","component","State"] {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id => "network_metrics"
      codec => json
    }
  }

  # network_info → severity <= 2
  if [severity] and [severity] <= 2 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id => "network_info"
      codec => json
    }
  }

  stdout { codec => rubydebug }
}