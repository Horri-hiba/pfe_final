[sources.tcp_input]
type = "socket"
mode = "tcp"
address = "0.0.0.0:6000"
decoding.codec = "bytes"


# =========================
# PARSE FORTINET SAFE VRL
# =========================
[transforms.parse_fortinet]
type = "remap"
inputs = ["tcp_input"]

source = '''
raw = to_string(.message) ?? ""
if raw == "" { abort }

cleaned = strip_whitespace(raw)

parsed = parse_csv(cleaned, delimiter: ";") ?? []
if length(parsed) < 8 { abort }

device_id = string!(parsed[0])
if device_id == "device_id" || device_id == "" { abort }

facility_raw = to_int(parsed[1]) ?? 1
priority_raw = to_int(parsed[2]) ?? 7

tag     = string!(parsed[4])
ts      = string!(parsed[5])
program = string!(parsed[6])

msg_raw   = string!(parsed[7])
msg_clean = replace(msg_raw, "\"", "")

kv = parse_key_value(msg_clean, key_value_delimiter: "=", field_delimiter: " ") ?? {}

action = if exists(kv.action) { string!(kv.action) } else { "" }
status = if exists(kv.status) { string!(kv.status) } else { "" }

srcip = if exists(kv.srcip) { string!(kv.srcip) } else { "" }
dstip = if exists(kv.dstip) { string!(kv.dstip) } else { "" }

srcport = to_int(kv.srcport) ?? 0
dstport = to_int(kv.dstport) ?? 0

sentbyte = to_int(kv.sentbyte) ?? 0
rcvdbyte = to_int(kv.rcvdbyte) ?? 0

latency = to_float(kv.latency) ?? 0.0

total_bytes = sentbyte + rcvdbyte

severity = 1
severity_label = "ok"

if priority_raw <= 2 { severity = 5; severity_label = "critical" }
if priority_raw == 3 { severity = 4; severity_label = "error" }
if priority_raw == 4 { severity = 3; severity_label = "warning" }
if priority_raw >= 5 { severity = 2; severity_label = "info" }

is_anomaly = 0
if status == "failed" { is_anomaly = 1 }
if action == "deny" { is_anomaly = 1 }
if action == "fail" { is_anomaly = 1 }
if severity >= 4 { is_anomaly = 1 }

.device_id = device_id
.ts = ts
.program = program
.tag = tag

.action = action
.status = status

.srcip = srcip
.dstip = dstip
.srcport = srcport
.dstport = dstport

.sentbyte = sentbyte
.rcvdbyte = rcvdbyte
.total_bytes = total_bytes

.latency = latency
.facility_raw = facility_raw

.severity = severity
.severity_label = severity_label

.is_anomaly = is_anomaly

.ingested_at = now()
'''


# =========================
# FILTERS SAFE
# =========================
[transforms.filter_security]
type = "filter"
inputs = ["parse_fortinet"]
condition = '.is_anomaly == 1'


[transforms.filter_traffic]
type = "filter"
inputs = ["parse_fortinet"]
condition = '.action == "accept" && .status == "success"'


[transforms.filter_performance]
type = "filter"
inputs = ["parse_fortinet"]
condition = '(to_int(.sentbyte) ?? 0) > 0 || (to_int(.rcvdbyte) ?? 0) > 0 || (to_float(.latency) ?? 0) > 0'


[transforms.filter_devices]
type = "filter"
inputs = ["parse_fortinet"]
condition = 'length(to_string(.device_id) ?? "") > 0'

# =========================
# DEBUG
# =========================
[sinks.console_debug]
type = "console"
inputs = ["parse_fortinet"]
encoding.codec = "json"


# =========================
# KAFKA
# =========================
[sinks.kafka_raw]
type = "kafka"
inputs = ["parse_fortinet"]
bootstrap_servers = "kafka:9092"
topic = "fg_raw_all"
encoding.codec = "json"


[sinks.kafka_security]
type = "kafka"
inputs = ["filter_security"]
bootstrap_servers = "kafka:9092"
topic = "fg_security_events"
encoding.codec = "json"


[sinks.kafka_traffic]
type = "kafka"
inputs = ["filter_traffic"]
bootstrap_servers = "kafka:9092"
topic = "fg_traffic_flow"
encoding.codec = "json"


[sinks.kafka_performance]
type = "kafka"
inputs = ["filter_performance"]
bootstrap_servers = "kafka:9092"
topic = "fg_performance"
encoding.codec = "json"


[sinks.kafka_devices]
type = "kafka"
inputs = ["filter_devices"]
bootstrap_servers = "kafka:9092"
topic = "fg_device_inventory"
encoding.codec = "json"
