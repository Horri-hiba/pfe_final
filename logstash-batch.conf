# ============================================================
# Logstash Batch — FortiGate logs
# Format CSV semicolon : device_id;facility;priority;level;tag;ts;program;"msg";seq
#
# PROBLEME RESOLU : le champ msg contient des guillemets quadruples """"val""""
# Le parser csv{} standard plante sur "Any value after quoted field isn't allowed"
# Solution : ruby{} pour splitter manuellement sur le premier ";" avant le msg quoté
# ============================================================

input {
  file {
    path           => "/data/*.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => plain { charset => "UTF-8" }
  }
}

filter {

  # ── Nettoyage BOM et CRLF ─────────────────────────────────────────────────
  mutate {
    strip => ["message"]
    gsub  => [
      "message", '^\xef\xbb\xbf', "",
      "message", '\r$',            ""
    ]
  }

  # Lignes vides → drop
  if [message] =~ /^\s*$/ { drop {} }

  # ── Extraction manuelle des colonnes via Ruby ──────────────────────────────
  # Format : col0;col1;col2;col3;col4;col5;col6;"msg avec """"";col8
  # csv{} plante car le msg contient des guillemets quadruples mal formes.
  # Strategie : splitter sur ";" en prenant les 7 premiers tokens fixes,
  # puis traiter le reste (msg + seq) manuellement.
  ruby {
    code => '
      line = event.get("message").to_s

      # Ignorer header
      if line.start_with?("device_id") || line.start_with?("id,") || line.start_with?("id;")
        event.tag("_header_skip")
        next
      end

      # Extraire les 7 premieres colonnes (split sur ; jusqu a pos 7)
      parts = []
      pos = 0
      7.times do
        idx = line.index(";", pos)
        break if idx.nil?
        parts << line[pos...idx]
        pos = idx + 1
      end

      if parts.length < 7
        event.tag("_invalid_line")
        next
      end

      # Nettoyer les guillemets residuels dans les colonnes fixes
      clean = lambda { |s| s.strip.gsub(/\A"+|"+\z/, "") }
      event.set("device_id", clean.call(parts[0]))
      event.set("facility",  parts[1].strip.to_i)
      event.set("priority",  parts[2].strip.to_i)
      event.set("level_raw", parts[3].strip.to_i)
      event.set("tag",       clean.call(parts[4]))
      event.set("ts",        clean.call(parts[5]))
      event.set("program",   clean.call(parts[6]))

      # Le reste : "msg_raw";seq
      rest = line[pos..]

      # Dernier ";" = separateur avant seq
      last_semi = rest.rindex(";")
      if last_semi
        msg_part = rest[0...last_semi]
        seq_part = rest[last_semi+1..].strip
      else
        msg_part = rest
        seq_part = "0"
      end

      # Nettoyer le msg
      msg = msg_part.strip
      # Enlever guillemets externes si presents (34 = code ASCII du guillemet)
      if msg.length >= 2 && msg[0] == 34.chr && msg[-1] == 34.chr
        msg = msg[1..-2]
      end
      # Reduire quadruple guillemets """"val"""" → val
      msg = msg.gsub(/""""([^"]*)""""/, "\\1")
      # Reduire double guillemets "" → vide (artéfact CSV)
      msg = msg.gsub(/""/, "")
      msg = msg.strip

      # Nettoyer les guillemets residuels dans seq
      seq_part = seq_part.gsub(/\A"+|"+\z/, "")
      event.set("msg_raw", msg)
      event.set("seq",     seq_part)
    '
  }

  # Drop les lignes invalides ou headers
  if [tags] and "header_skip" in [tags]  { drop {} }
  if [tags] and "invalid_line" in [tags] { drop {} }
  if ![device_id] or [device_id] == ""  { drop {} }

  # ── Calcul sévérité (même logique que Vector real-time) ───────────────────
  ruby {
    code => '
      p = event.get("priority").to_i
      if    p <= 2 then event.set("severity", 5); event.set("severity_label", "critical")
      elsif p == 3 then event.set("severity", 4); event.set("severity_label", "error")
      elsif p == 4 then event.set("severity", 3); event.set("severity_label", "warning")
      elsif p == 5 then event.set("severity", 2); event.set("severity_label", "info")
      else               event.set("severity", 1); event.set("severity_label", "ok")
      end
    '
  }

  # ── Extraction latence via grok ───────────────────────────────────────────
  # Format dans le msg : "latency: 11.542"  (pas parsable par kv car espace apres :)
  grok {
    match          => { "msg_raw" => "latency:\s*(?<latency_str>[0-9]+(?:\.[0-9]+)?)" }
    tag_on_failure => []
  }

  # ── Parser champs clé=valeur FortiGate dans msg_raw ───────────────────────
  kv {
    source       => "msg_raw"
    field_split  => " "
    value_split  => "="
    target       => "kv"
    include_keys => [
      "type","subtype","action","status","logid","logdesc",
      "srcip","dstip","srcport","dstport","proto","service",
      "policyname","policytype","poluuid",
      "sentbyte","rcvdbyte","sessionid",
      "vwlid","vwlquality","devname","devtype","srchwvendor","srcmac","eventtime"
    ]
    allow_duplicate_values => false
  }

  # ── Aplatir kv → root ─────────────────────────────────────────────────────
  mutate {
    rename => {
      "[kv][type]"        => "event_type"
      "[kv][subtype]"     => "subtype"
      "[kv][action]"      => "action"
      "[kv][status]"      => "status"
      "[kv][logid]"       => "event_id"
      "[kv][logdesc]"     => "logdesc"
      "[kv][srcip]"       => "srcip"
      "[kv][dstip]"       => "dstip"
      "[kv][srcport]"     => "srcport"
      "[kv][dstport]"     => "dstport"
      "[kv][proto]"       => "proto"
      "[kv][service]"     => "service"
      "[kv][policyname]"  => "policyname"
      "[kv][policytype]"  => "policytype"
      "[kv][poluuid]"     => "poluuid"
      "[kv][sentbyte]"    => "sentbyte"
      "[kv][rcvdbyte]"    => "rcvdbyte"
      "[kv][sessionid]"   => "sessionid"
      "[kv][vwlid]"       => "vwlid"
      "[kv][vwlquality]"  => "vwlquality"
      "[kv][devname]"     => "devname"
      "[kv][devtype]"     => "devtype"
      "[kv][srchwvendor]" => "srchwvendor"
      "[kv][srcmac]"      => "srcmac"
      "[kv][eventtime]"   => "eventtime"
    }
  }

  # ── Nettoyage guillemets résiduels dans les champs kv ──────────────────────
  # srcmac, vwlquality, poluuid etc. peuvent contenir des " résiduels du CSV
  mutate {
    gsub => [
      "srcmac",     '^"+|"+$', "",
      "vwlquality", '^"+|"+$', "",
      "poluuid",    '^"+|"+$', "",
      "policyname", '^"+|"+$', "",
      "policytype", '^"+|"+$', "",
      "sessionid",  '^"+|"+$', "",
      "devname",    '^"+|"+$', "",
      "devtype",    '^"+|"+$', "",
      "srchwvendor",'^"+|"+$', "",
      "srcip",      '^"+|"+$', "",
      "dstip",      '^"+|"+$', "",
      "service",    '^"+|"+$', "",
      "event_id",   '^"+|"+$', "",
      "logdesc",    '^"+|"+$', ""
    ]
  }

  # ── Valeurs par défaut via Ruby ───────────────────────────────────────────
  ruby {
    code => '
      str_defaults = {
        "event_type"  => "unknown", "subtype"    => "", "action"    => "",
        "status"      => "",        "event_id"   => "", "logdesc"   => "",
        "srcip"       => "",        "dstip"      => "", "service"   => "",
        "policyname"  => "",        "policytype" => "", "poluuid"   => "",
        "sessionid"   => "",        "vwlquality" => "", "devname"   => "",
        "devtype"     => "",        "srchwvendor"=> "", "srcmac"    => "",
        "eventtime"   => ""
      }
      int_defaults = {
        "srcport" => 0, "dstport" => 0, "proto"    => 0,
        "sentbyte"=> 0, "rcvdbyte"=> 0, "vwlid"    => 0
      }
      str_defaults.each do |k, v|
        val = event.get(k)
        event.set(k, v) if val.nil? || val.to_s.strip.empty? || val.to_s =~ /^%\{/
      end
      int_defaults.each do |k, v|
        val = event.get(k)
        event.set(k, v) if val.nil? || val.to_s.strip.empty? || val.to_s =~ /^%\{/
      end
    '
  }

  # ── Conversions numériques ─────────────────────────────────────────────────
  mutate {
    convert => {
      "srcport"  => "integer"
      "dstport"  => "integer"
      "proto"    => "integer"
      "sentbyte" => "integer"
      "rcvdbyte" => "integer"
      "vwlid"    => "integer"
      "severity" => "integer"
    }
  }

  # ── Latence float ─────────────────────────────────────────────────────────
  if [latency_str] and [latency_str] != "" {
    mutate { convert => { "latency_str" => "float" } }
    mutate { rename  => { "latency_str" => "latency" } }
  } else {
    mutate { add_field => { "latency" => 0.0 } }
    mutate { convert  => { "latency"  => "float" } }
  }

  # ── total_bytes ───────────────────────────────────────────────────────────
  ruby {
    code => '
      s = (event.get("sentbyte") || 0).to_i
      r = (event.get("rcvdbyte") || 0).to_i
      event.set("total_bytes", s + r)
    '
  }

  # ── message final ─────────────────────────────────────────────────────────
  ruby {
    code => '
      ld = event.get("logdesc").to_s.strip
      if ld.length > 0
        event.set("message", ld)
      else
        raw = event.get("msg_raw").to_s
        event.set("message", raw.length > 200 ? raw[0, 200] : raw)
      end
    '
  }

  # ── is_anomaly (même règle que Vector) ───────────────────────────────────
  ruby {
    code => '
      action   = event.get("action").to_s.strip
      status   = event.get("status").to_s.strip
      severity = event.get("severity").to_i
      ano = 0
      ano = 1 if status   == "failed"
      ano = 1 if action   == "deny"
      ano = 1 if action   == "fail"
      ano = 1 if severity >= 4
      ano = 1 if (action == "fail" || action == "deny") && status == "success"
      event.set("is_anomaly", ano)
    '
  }

  # ── Timestamp ingestion ───────────────────────────────────────────────────
  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
  }

  # ── Nettoyage champs internes ─────────────────────────────────────────────
  mutate {
    remove_field => [
      "@version", "host", "log", "event", "kv",
      "msg_raw", "logdesc", "level_raw", "priority", "facility",
      "latency_str", "tags"
    ]
  }
}

# ── Outputs Kafka ─────────────────────────────────────────────────────────────

output {

  # fg_raw_all → audit complet 100%
  kafka {
    bootstrap_servers => "kafka-batch:9092"
    topic_id          => "fg_raw_all"
    codec             => json
  }

  # fg_security_events → anomalies ~58%
  if [is_anomaly] == 1 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_security_events"
      codec             => json
    }
  }

  # fg_traffic_flow → trafic légitime ~42%
  if [action] == "accept" and [status] == "success" {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_traffic_flow"
      codec             => json
    }
  }

  # fg_performance → métriques mesurables ~95%
  if [sentbyte] > 0 or [rcvdbyte] > 0 or [latency] > 0.0 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_performance"
      codec             => json
    }
  }

  # fg_device_inventory → inventaire
  if [device_id] and [device_id] != "" and [devtype] and [devtype] != "" {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_device_inventory"
      codec             => json
    }
  }

  stdout { codec => rubydebug }
}