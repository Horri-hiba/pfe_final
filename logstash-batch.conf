# ============================================================
# Logstash Batch — FortiGate logs (CSV semicolon)
# Format : device_id;facility;priority;level;tag;ts;program;"msg";seq
# Probleme original : guillemets quadruples """" dans le champ msg
# Solution        : parser Ruby manuel + nettoyage en cascade
# Sortie          : 5 topics Kafka (batch) — pas de stdout en prod
# ============================================================

input {
  file {
    path           => "/data/*.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => plain { charset => "UTF-8" }
    # Une seule passe : quand le fichier est ingere, on ne reboucle pas
    close_older    => "1 minute"
  }
}

filter {

  # ── Nettoyage BOM / CRLF / espaces ──────────────────────────────────────
  mutate {
    strip => ["message"]
    gsub  => [
      "message", '^\xef\xbb\xbf', "",
      "message", '\r$',            ""
    ]
  }

  # Drop lignes vides
  if [message] =~ /^\s*$/ { drop {} }

  # ── Parsing manuel via Ruby (evite le bug csv{} sur guillemets malformes)
  ruby {
    code => '
      line = event.get("message").to_s

      # Ignorer headers CSV eventuels
      if line.start_with?("device_id") || line.start_with?("id,") || line.start_with?("id;")
        event.tag("_header_skip")
        next
      end

      # Extraire les 7 premières colonnes (séparateur ";")
      parts = []
      pos = 0
      7.times do
        idx = line.index(";", pos)
        break if idx.nil?
        parts << line[pos...idx]
        pos = idx + 1
      end

      if parts.length < 7
        event.tag("_invalid_line")
        next
      end

      # Nettoyer guillemets résiduels
      clean = lambda { |s| s.strip.gsub(/\A"+|"+\z/, "") }

      event.set("device_id", clean.call(parts[0]))
      event.set("facility",  parts[1].strip.to_i)
      event.set("priority",  parts[2].strip.to_i)
      event.set("level_raw", parts[3].strip.to_i)
      event.set("tag",       clean.call(parts[4]))
      event.set("ts",        clean.call(parts[5]))
      event.set("program",   clean.call(parts[6]))

      # Reste : "msg";seq  (dernier ; sépare msg et seq)
      rest = line[pos..]
      last_semi = rest.rindex(";")

      if last_semi
        msg_part = rest[0...last_semi]
        seq_part = rest[last_semi+1..].strip
      else
        msg_part = rest
        seq_part = "0"
      end

      # Nettoyer msg
      msg = msg_part.strip
      # Enlever guillemets externes
      if msg.length >= 2 && msg[0] == 34.chr && msg[-1] == 34.chr
        msg = msg[1..-2]
      end
      # Reduire """"val"""" → val
      msg = msg.gsub(/""""([^"]*)""""/, "\\1")
      # Reduire "" → vide (artefact CSV)
      msg = msg.gsub(/""/, "")
      msg = msg.strip

      seq_part = seq_part.gsub(/\A"+|"+\z/, "")

      event.set("msg_raw", msg)
      event.set("seq",     seq_part)
    '
  }

  # Drop headers / invalides / sans device_id
  if [tags] and "header_skip"  in [tags]  { drop {} }
  if [tags] and "invalid_line" in [tags] { drop {} }
  if ![device_id] or [device_id] == ""   { drop {} }

  # ── Sévérité (identique à Vector real-time) ─────────────────────────────
  ruby {
    code => '
      p = event.get("priority").to_i
      if    p <= 2 then event.set("severity", 5); event.set("severity_label", "critical")
      elsif p == 3 then event.set("severity", 4); event.set("severity_label", "error")
      elsif p == 4 then event.set("severity", 3); event.set("severity_label", "warning")
      elsif p == 5 then event.set("severity", 2); event.set("severity_label", "info")
      else               event.set("severity", 1); event.set("severity_label", "ok")
      end
    '
  }

  # ── Extraction latence via grok ───────────────────────────────────────────
  grok {
    match          => { "msg_raw" => "latency:\\s*(?<latency_str>[0-9]+(?:\\.[0-9]+)?)" }
    tag_on_failure => []
  }

  # ── Parser clé=valeur FortiGate (msg_raw) ─────────────────────────────────
  kv {
    source       => "msg_raw"
    field_split  => " "
    value_split  => "="
    target       => "kv"
    include_keys => [
      "type","subtype","action","status","logid","logdesc",
      "srcip","dstip","srcport","dstport","proto","service",
      "policyname","policytype","poluuid",
      "sentbyte","rcvdbyte","sessionid",
      "vwlid","vwlquality","devname","devtype","srchwvendor","srcmac","eventtime"
    ]
    allow_duplicate_values => false
  }

  # ── Aplatir kv → root ─────────────────────────────────────────────────────
  mutate {
    rename => {
      "[kv][type]"        => "event_type"
      "[kv][subtype]"     => "subtype"
      "[kv][action]"      => "action"
      "[kv][status]"      => "status"
      "[kv][logid]"       => "event_id"
      "[kv][logdesc]"     => "logdesc"
      "[kv][srcip]"       => "srcip"
      "[kv][dstip]"       => "dstip"
      "[kv][srcport]"     => "srcport"
      "[kv][dstport]"     => "dstport"
      "[kv][proto]"       => "proto"
      "[kv][service]"     => "service"
      "[kv][policyname]"  => "policyname"
      "[kv][policytype]"  => "policytype"
      "[kv][poluuid]"     => "poluuid"
      "[kv][sentbyte]"    => "sentbyte"
      "[kv][rcvdbyte]"    => "rcvdbyte"
      "[kv][sessionid]"   => "sessionid"
      "[kv][vwlid]"       => "vwlid"
      "[kv][vwlquality]"  => "vwlquality"
      "[kv][devname]"     => "devname"
      "[kv][devtype]"     => "devtype"
      "[kv][srchwvendor]" => "srchwvendor"
      "[kv][srcmac]"      => "srcmac"
      "[kv][eventtime]"   => "eventtime"
    }
  }

  # ── Nettoyage guillemets résiduels (artefacts CSV) ────────────────────────
  mutate {
    gsub => [
      "srcmac",      '^"+|"+$', "",
      "vwlquality",  '^"+|"+$', "",
      "poluuid",     '^"+|"+$', "",
      "policyname",  '^"+|"+$', "",
      "policytype",  '^"+|"+$', "",
      "sessionid",   '^"+|"+$', "",
      "devname",     '^"+|"+$', "",
      "devtype",     '^"+|"+$', "",
      "srchwvendor", '^"+|"+$', "",
      "srcip",       '^"+|"+$', "",
      "dstip",       '^"+|"+$', "",
      "service",     '^"+|"+$', "",
      "event_id",    '^"+|"+$', "",
      "logdesc",     '^"+|"+$', ""
    ]
  }

  # ── Valeurs par défaut ────────────────────────────────────────────────────
  ruby {
    code => '
      str_defaults = {
        "event_type" => "unknown", "subtype"    => "", "action"     => "",
        "status"     => "",        "event_id"   => "", "logdesc"    => "",
        "srcip"      => "",        "dstip"      => "", "service"    => "",
        "policyname" => "",        "policytype" => "", "poluuid"    => "",
        "sessionid"  => "",        "vwlquality" => "", "devname"    => "",
        "devtype"    => "",        "srchwvendor"=> "", "srcmac"     => "",
        "eventtime"  => ""
      }
      int_defaults = {
        "srcport" => 0, "dstport" => 0, "proto"    => 0,
        "sentbyte"=> 0, "rcvdbyte"=> 0, "vwlid"    => 0
      }
      str_defaults.each do |k, v|
        val = event.get(k)
        event.set(k, v) if val.nil? || val.to_s.strip.empty? || val.to_s =~ /^%\{/
      end
      int_defaults.each do |k, v|
        val = event.get(k)
        event.set(k, v) if val.nil? || val.to_s.strip.empty? || val.to_s =~ /^%\{/
      end
    '
  }

  # ── Conversions numériques ──────────────────────────────────────────────
  mutate {
    convert => {
      "srcport"  => "integer"
      "dstport"  => "integer"
      "proto"    => "integer"
      "sentbyte" => "integer"
      "rcvdbyte" => "integer"
      "vwlid"    => "integer"
      "severity" => "integer"
    }
  }

  # ── Latence float ─────────────────────────────────────────────────────────
  if [latency_str] and [latency_str] != "" {
    mutate { convert => { "latency_str" => "float" } }
    mutate { rename  => { "latency_str" => "latency" } }
  } else {
    mutate { add_field => { "latency" => 0.0 } }
    mutate { convert  => { "latency"  => "float" } }
  }

  # ── total_bytes ──────────────────────────────────────────────────────────
  ruby {
    code => '
      s = (event.get("sentbyte") || 0).to_i
      r = (event.get("rcvdbyte") || 0).to_i
      event.set("total_bytes", s + r)
    '
  }

  # ── Message final (logdesc sinon msg_raw tronqué) ────────────────────────
  ruby {
    code => '
      ld = event.get("logdesc").to_s.strip
      if ld.length > 0
        event.set("message", ld)
      else
        raw = event.get("msg_raw").to_s
        event.set("message", raw.length > 200 ? raw[0, 200] : raw)
      end
    '
  }

  # ── is_anomaly (même règle que Vector real-time) ────────────────────────
  ruby {
    code => '
      action   = event.get("action").to_s.strip
      status   = event.get("status").to_s.strip
      severity = event.get("severity").to_i
      ano = 0
      ano = 1 if status   == "failed"
      ano = 1 if action   == "deny"
      ano = 1 if action   == "fail"
      ano = 1 if severity >= 4
      ano = 1 if (action == "fail" || action == "deny") && status == "success"
      event.set("is_anomaly", ano)
    '
  }

  # ── Timestamp ingestion ───────────────────────────────────────────────────
  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
  }

  # ── Nettoyage champs internes ────────────────────────────────────────────
  mutate {
    remove_field => [
      "@version", "host", "log", "event", "kv",
      "msg_raw", "logdesc", "level_raw", "priority", "facility",
      "latency_str", "tags"
    ]
  }
}

# ── Outputs Kafka (batch) — stdout SUPPRIME en production ────────────────────
output {

  # fg_raw_all → audit complet 100%
  kafka {
    bootstrap_servers => "kafka-batch:9092"
    topic_id          => "fg_raw_all"
    codec             => json
  }

  # fg_security_events → anomalies
  if [is_anomaly] == 1 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_security_events"
      codec             => json
    }
  }

  # fg_traffic_flow → trafic légitime
  if [action] == "accept" and [status] == "success" {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_traffic_flow"
      codec             => json
    }
  }

  # fg_performance → métriques mesurables
  if [sentbyte] > 0 or [rcvdbyte] > 0 or [latency] > 0.0 {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_performance"
      codec             => json
    }
  }

  # fg_device_inventory → inventaire
  if [device_id] and [device_id] != "" and [devtype] and [devtype] != "" {
    kafka {
      bootstrap_servers => "kafka-batch:9092"
      topic_id          => "fg_device_inventory"
      codec             => json
    }
  }

  # DEBUG UNIQUEMENT : décommenter pour tester, commenter en production
  # stdout { codec => rubydebug }
}
